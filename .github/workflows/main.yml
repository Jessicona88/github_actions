name: Inspirational quote of the day
on: 
  schedule:
    - cron: 0 8 * * 1-5
  workflow_dispatch: 
        
jobs:
  get_quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install Requests library
        run: python -m pip install requests
  
      - name: Run script to get quote and print
        run: |
          quote ="$(python .github/scripts/quotable.py)"
          echo "$quote"
          echo "$quote" >> "$GITHUB_STEP_SUMMARY"

