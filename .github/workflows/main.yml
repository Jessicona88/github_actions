name: Inspirational quote of the day
on: 
  schedule:
    - cron: 0 8 * * 1-5
        
jobs:
  get_quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
  
      - name: Run script to get quote
        run: ./.github/scripts/quotable.py

