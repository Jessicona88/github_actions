name: Quote to GitHub Pages

on:
  #schedule:
    #- cron: '30 13 * * 1-5' #UTC = GMT+2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: python -m pip install requests

      - name: Generate quote page
        run: |
          quote="$(python .github/scripts/quotable.py)"
          mkdir -p site
          cat > site/index.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Quote of the Day</title>
            </head>
            <body style="font-family: sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6;">
              <h1>Inspirational quote of the day</h1>
              <blockquote style="font-size: 1.3rem;">$quote</blockquote>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
