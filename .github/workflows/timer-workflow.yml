on:
  push:
    branches: main
  pull_request:

jobs:
  env_info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      
      - name: Install pytest
        run: python -m pip install pytest
      
      - name: Run pytest tests
        run: python -m pytest test-timer.py
