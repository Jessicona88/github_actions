on:
  push:
    branches: main
  pull_request:

jobs:
  env_info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print env info
        run: echo "$RUNNER_OS"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pytest-cov
        # You may pin to the exact commit or the version.
        # uses: lpenz/ghaction-pytest-cov@e7d3d83610d0e4a25353bc80198ff3dc47cfe114
        uses: lpenz/ghaction-pytest-cov@v1
        with:
          # Run pytest in this directory
          working-directory: # optional, default is .
          
      - name: Run pytest tests
        run: python -m pytest test-timer.py
  
